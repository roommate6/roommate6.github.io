<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASE Preview</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", monospace;
        background: #1a1a1a;
        color: #e0e0e0;
        padding: 20px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .container {
        background: #2d2d2d;
        border: 1px solid #404040;
        border-radius: 8px;
        padding: 30px;
        max-width: 600px;
        width: 100%;
      }

      h1 {
        margin-bottom: 10px;
        font-size: 24px;
      }

      .info-text {
        font-size: 12px;
        color: #888;
        margin-bottom: 20px;
      }

      .controls {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }

      input[type="text"] {
        flex: 1;
        padding: 10px;
        background: #353535;
        border: 1px solid #505050;
        border-radius: 4px;
        color: #e0e0e0;
        font-family: monospace;
        font-size: 12px;
      }

      button {
        background: #505050;
        border: 1px solid #606060;
        color: #e0e0e0;
        padding: 10px 16px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        transition: background 0.2s;
      }

      button:hover {
        background: #606060;
      }

      .preview-area {
        background: #1a1a1a;
        border: 2px dashed #404040;
        border-radius: 6px;
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 300px;
        margin-bottom: 20px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .preview-area:hover {
        border-color: #505050;
        background: #252525;
      }

      .preview-area.drag-over {
        border-color: #99ccff;
        background: #2d3a4a;
      }

      #canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        max-width: 100%;
        max-height: 400px;
        border: 1px solid #404040;
        border-radius: 4px;
      }

      .status {
        padding: 12px;
        border-radius: 4px;
        font-size: 13px;
        margin-bottom: 16px;
        display: none;
      }

      .status.show {
        display: block;
      }

      .status.loading {
        background: #2d4a2d;
        color: #7fc97f;
        border: 1px solid #4a7a4a;
      }

      .status.error {
        background: #4a2d2d;
        color: #ff9999;
        border: 1px solid #7a4a4a;
      }

      .status.success {
        background: #2d3a4a;
        color: #99ccff;
        border: 1px solid #4a6a7a;
      }

      .meta {
        background: #353535;
        border-left: 3px solid #505050;
        padding: 12px 16px;
        border-radius: 4px;
        font-size: 12px;
        line-height: 1.6;
        display: none;
      }

      .meta.show {
        display: block;
      }

      .meta strong {
        color: #99ccff;
      }

      .url-display {
        background: #1a1a1a;
        border: 1px solid #404040;
        padding: 10px;
        border-radius: 4px;
        font-size: 11px;
        margin-top: 16px;
        word-break: break-all;
        color: #888;
        font-family: monospace;
      }

      input[type="file"] {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🎨 ASE Preview</h1>
      <div class="info-text">Load an ASE file to preview the first frame</div>

      <div class="controls">
        <input
          type="text"
          id="filePath"
          placeholder="e.g., ./sprites/character.ase"
        />
        <button onclick="loadFromPath()">Load</button>
      </div>

      <div id="status" class="status"></div>

      <div class="preview-area" id="previewArea">
        <canvas id="canvas"></canvas>
      </div>

      <div id="metaInfo" class="meta"></div>

      <div class="url-display">
        <strong>Tip:</strong> Use URL parameter to auto-load:
        <code>?file=path/to/file.ase</code>
      </div>
    </div>

    <input type="file" id="fileInput" accept=".ase,.aseprite" />

    <script type="module">
      import pako from "https://cdn.jsdelivr.net/npm/pako@2.1.0/+esm";

      // Wrapper to make ArrayBuffer compatible with Node.js Buffer API
      class BufferWrapper {
        constructor(arrayBuffer) {
          this.arrayBuffer = arrayBuffer;
          this.dataView = new DataView(arrayBuffer);
        }

        readUInt8(offset) {
          return this.dataView.getUint8(offset);
        }

        readUInt16LE(offset) {
          return this.dataView.getUint16(offset, true);
        }

        readInt16LE(offset) {
          return this.dataView.getInt16(offset, true);
        }

        readUInt32LE(offset) {
          return this.dataView.getUint32(offset, true);
        }

        readInt32LE(offset) {
          return this.dataView.getInt32(offset, true);
        }

        readFloatLE(offset) {
          return this.dataView.getFloat32(offset, true);
        }

        toString(
          encoding = "utf8",
          start = 0,
          end = this.arrayBuffer.byteLength,
        ) {
          const slice = this.arrayBuffer.slice(start, end);
          return new TextDecoder(encoding).decode(slice);
        }
      }

      // Aseprite parser from the ase-parser library
      class Aseprite {
        constructor(buffer) {
          this._offset = 0;
          this._buffer = new BufferWrapper(buffer);
          this.frames = [];
          this.layers = [];
          this.slices = [];
          this.fileSize = 0;
          this.numFrames = 0;
          this.width = 0;
          this.height = 0;
          this.colorDepth = 0;
          this.paletteIndex = 0;
          this.numColors = 0;
          this.pixelRatio = "1:1";
          this.name = "";
          this.tags = [];
          this.tilesets = [];
        }

        readNextByte() {
          const byte = this._buffer.readUInt8(this._offset);
          this._offset += 1;
          return byte;
        }

        readNextWord() {
          const word = this._buffer.readUInt16LE(this._offset);
          this._offset += 2;
          return word;
        }

        readNextShort() {
          const short = this._buffer.readInt16LE(this._offset);
          this._offset += 2;
          return short;
        }

        readNextDWord() {
          const dword = this._buffer.readUInt32LE(this._offset);
          this._offset += 4;
          return dword;
        }

        readNextLong() {
          const long = this._buffer.readInt32LE(this._offset);
          this._offset += 4;
          return long;
        }

        readNextFixed() {
          const fixed = this._buffer.readFloatLE(this._offset);
          this._offset += 4;
          return fixed;
        }

        readNextBytes(numBytes) {
          let str = "";
          for (let i = 0; i < numBytes; i++) {
            str += String.fromCharCode(this.readNextByte());
          }
          return str;
        }

        readNextRawBytes(numBytes) {
          const bytes = new Uint8Array(numBytes);
          for (let i = 0; i < numBytes; i++) {
            bytes[i] = this.readNextByte();
          }
          return bytes;
        }

        readNextString() {
          const numBytes = this.readNextWord();
          return this.readNextBytes(numBytes);
        }

        skipBytes(numBytes) {
          this._offset += numBytes;
        }

        #translateFlags(flagValue) {
          const flagMap = {
            visible: 0b1,
            editable: 0b10,
            lockMovement: 0b100,
            background: 0b1000,
            preferLinkedCels: 0b10000,
            collapsedGroup: 0b100000,
            reference: 0b1000000,
          };
          const result = {};
          for (const flag in flagMap) {
            result[flag] = (flagValue & flagMap[flag]) === flagMap[flag];
          }
          return result;
        }

        readHeader() {
          this.fileSize = this.readNextDWord();
          this.readNextWord(); // magic number
          this.numFrames = this.readNextWord();
          this.width = this.readNextWord();
          this.height = this.readNextWord();
          this.colorDepth = this.readNextWord();
          this.skipBytes(14);
          this.paletteIndex = this.readNextByte();
          this.skipBytes(3);
          this.numColors = this.readNextWord();
          const pixW = this.readNextByte();
          const pixH = this.readNextByte();
          this.pixelRatio = `${pixW}:${pixH}`;
          this.skipBytes(92);
          return this.numFrames;
        }

        readFrame() {
          const bytesInFrame = this.readNextDWord();
          this.skipBytes(2); // magic
          const oldChunk = this.readNextWord();
          const frameDuration = this.readNextWord();
          this.skipBytes(2);
          const newChunk = this.readNextDWord();
          let cels = [];

          for (let i = 0; i < newChunk; i++) {
            const chunkData = this.readChunk();
            const chunkType = chunkData.type;

            switch (chunkType) {
              case 0x2005:
                cels.push(this.readCelChunk(chunkData.chunkSize));
                break;
              case 0x2004:
                this.readLayerChunk();
                break;
              case 0x2018:
                this.readFrameTagsChunk();
                break;
              case 0x2019:
                this.palette = this.readPaletteChunk();
                break;
              default:
                this.skipBytes(chunkData.chunkSize - 6);
            }
          }

          this.frames.push({
            bytesInFrame,
            frameDuration,
            numChunks: newChunk,
            cels,
          });
        }

        readLayerChunk() {
          const layer = {};
          layer.flags = this.#translateFlags(this.readNextWord());
          layer.type = this.readNextWord();
          layer.layerChildLevel = this.readNextWord();
          this.skipBytes(4);
          layer.blendMode = this.readNextWord();
          layer.opacity = this.readNextByte();
          this.skipBytes(3);
          layer.name = this.readNextString();
          this.layers.push(layer);
        }

        readCelChunk(chunkSize) {
          const layerIndex = this.readNextWord();
          const x = this.readNextShort();
          const y = this.readNextShort();
          const opacity = this.readNextByte();
          const celType = this.readNextWord();
          const zIndex = this.readNextShort();
          this.skipBytes(5);

          if (celType === 1) {
            return {
              layerIndex,
              xpos: x,
              ypos: y,
              opacity,
              celType,
              zIndex,
              w: 0,
              h: 0,
              rawCelData: undefined,
              link: this.readNextWord(),
            };
          }

          const w = this.readNextWord();
          const h = this.readNextWord();

          if (celType === 0 || celType === 2) {
            const buff = this.readNextRawBytes(chunkSize - 26);
            return {
              layerIndex,
              xpos: x,
              ypos: y,
              opacity,
              celType,
              zIndex,
              w,
              h,
              rawCelData: celType === 2 ? pako.inflate(buff) : buff,
            };
          }

          return {
            layerIndex,
            xpos: x,
            ypos: y,
            opacity,
            celType,
            zIndex,
            w,
            h,
            rawCelData: new Uint8Array(),
          };
        }

        readFrameTagsChunk() {
          const numTags = this.readNextWord();
          this.skipBytes(8);
          for (let i = 0; i < numTags; i++) {
            this.readNextWord(); // from
            this.readNextWord(); // to
            this.readNextByte(); // loop
            this.readNextWord(); // repeat
            this.skipBytes(6);
            this.skipBytes(3); // color
            this.skipBytes(1);
            this.readNextString(); // name
          }
        }

        readPaletteChunk() {
          const paletteSize = this.readNextDWord();
          const firstColor = this.readNextDWord();
          const lastColor = this.readNextDWord();
          this.skipBytes(8);
          const colors = [];
          for (let i = 0; i < paletteSize; i++) {
            const flag = this.readNextWord();
            const r = this.readNextByte();
            const g = this.readNextByte();
            const b = this.readNextByte();
            const a = this.readNextByte();
            colors.push({ r, g, b, a });
            if (flag === 1) this.readNextString();
          }
          return { paletteSize, firstColor, lastColor, colors };
        }

        readChunk() {
          const chunkSize = this.readNextDWord();
          const type = this.readNextWord();
          return { chunkSize, type };
        }

        parse() {
          this.readHeader();
          for (let i = 0; i < this.numFrames; i++) {
            this.readFrame();
          }
          // Link cel references
          for (let i = 0; i < this.numFrames; i++) {
            for (let j = 0; j < this.frames[i].cels.length; j++) {
              const cel = this.frames[i].cels[j];
              if (cel.link !== undefined) {
                for (let k = 0; k < this.frames[cel.link].cels.length; k++) {
                  const srcCel = this.frames[cel.link].cels[k];
                  if (srcCel.layerIndex === cel.layerIndex) {
                    cel.w = srcCel.w;
                    cel.h = srcCel.h;
                    cel.rawCelData = srcCel.rawCelData;
                    break;
                  }
                }
              }
            }
          }
        }
      }

      const canvas = document.getElementById("canvas");
      const statusDiv = document.getElementById("status");
      const metaInfo = document.getElementById("metaInfo");
      const filePathInput = document.getElementById("filePath");
      const previewArea = document.getElementById("previewArea");
      const fileInput = document.getElementById("fileInput");

      function showStatus(message, type = "info") {
        statusDiv.className = `status show ${type}`;
        statusDiv.textContent = message;
      }

      function showMeta(data) {
        metaInfo.className = "meta show";
        metaInfo.innerHTML = `
                <strong>File:</strong> ${data.filename}<br>
                <strong>Dimensions:</strong> ${data.width}×${data.height}px<br>
                <strong>Frames:</strong> ${data.frameCount}<br>
                <strong>Color Depth:</strong> ${data.colorDepth}-bit
            `;
      }

      // Render 32-bit RGBA pixels
      function renderRGBA(imageData, cel, ase) {
        const width = ase.width;
        const height = ase.height;
        const celData = cel.rawCelData;
        const celWidth = cel.w;
        const celHeight = cel.h;
        const xPos = cel.xpos;
        const yPos = cel.ypos;

        for (let y = 0; y < celHeight && yPos + y < height; y++) {
          for (let x = 0; x < celWidth && xPos + x < width; x++) {
            const srcIdx = (y * celWidth + x) * 4;
            const dstIdx = ((yPos + y) * width + (xPos + x)) * 4;

            if (srcIdx + 3 < celData.length && dstIdx + 3 < imageData.length) {
              imageData[dstIdx] = celData[srcIdx]; // R
              imageData[dstIdx + 1] = celData[srcIdx + 1]; // G
              imageData[dstIdx + 2] = celData[srcIdx + 2]; // B
              imageData[dstIdx + 3] = celData[srcIdx + 3]; // A
            }
          }
        }
      }

      // Render 16-bit RGB pixels
      function renderRGB16(imageData, cel, ase) {
        const width = ase.width;
        const height = ase.height;
        const celData = cel.rawCelData;
        const celWidth = cel.w;
        const celHeight = cel.h;
        const xPos = cel.xpos;
        const yPos = cel.ypos;

        for (let y = 0; y < celHeight && yPos + y < height; y++) {
          for (let x = 0; x < celWidth && xPos + x < width; x++) {
            const srcIdx = (y * celWidth + x) * 2;
            const dstIdx = ((yPos + y) * width + (xPos + x)) * 4;

            if (srcIdx + 1 < celData.length && dstIdx + 3 < imageData.length) {
              const pixel = celData[srcIdx] | (celData[srcIdx + 1] << 8);
              const r = (pixel >> 11) & 0x1f;
              const g = (pixel >> 5) & 0x3f;
              const b = pixel & 0x1f;

              imageData[dstIdx] = (r << 3) | (r >> 2);
              imageData[dstIdx + 1] = (g << 2) | (g >> 4);
              imageData[dstIdx + 2] = (b << 3) | (b >> 2);
              imageData[dstIdx + 3] = 255;
            }
          }
        }
      }

      // Render 8-bit indexed color using palette
      function renderIndexed(imageData, cel, ase) {
        if (!ase.palette || !ase.palette.colors) {
          renderRGBA(imageData, cel, ase); // fallback
          return;
        }

        const width = ase.width;
        const height = ase.height;
        const celData = cel.rawCelData;
        const celWidth = cel.w;
        const celHeight = cel.h;
        const xPos = cel.xpos;
        const yPos = cel.ypos;
        const palette = ase.palette.colors;

        for (let y = 0; y < celHeight && yPos + y < height; y++) {
          for (let x = 0; x < celWidth && xPos + x < width; x++) {
            const srcIdx = y * celWidth + x;
            const dstIdx = ((yPos + y) * width + (xPos + x)) * 4;

            if (srcIdx < celData.length && dstIdx + 3 < imageData.length) {
              const colorIdx = celData[srcIdx];
              const color = palette[colorIdx] || { r: 0, g: 0, b: 0, a: 255 };

              imageData[dstIdx] = color.r || 0;
              imageData[dstIdx + 1] = color.g || 0;
              imageData[dstIdx + 2] = color.b || 0;
              imageData[dstIdx + 3] = color.a !== undefined ? color.a : 255;
            }
          }
        }
      }

      function renderAseprite(buffer, filename) {
        try {
          showStatus("Parsing ASE file...", "loading");

          const ase = new Aseprite(buffer);
          ase.parse();

          if (!ase.frames || ase.frames.length === 0) {
            throw new Error("No frames found");
          }

          canvas.width = ase.width;
          canvas.height = ase.height;

          const ctx = canvas.getContext("2d");
          const imageData = ctx.createImageData(ase.width, ase.height);
          const data = imageData.data;

          // Fill with transparent background
          for (let i = 0; i < data.length; i += 4) {
            data[i + 3] = 0; // alpha
          }

          const firstFrame = ase.frames[0];
          if (firstFrame.cels.length > 0) {
            const cel = firstFrame.cels[0];
            if (cel.rawCelData && cel.rawCelData.length > 0) {
              // Render based on color depth
              if (ase.colorDepth === 32) {
                // 32-bit RGBA - data is already RGBA
                renderRGBA(data, cel, ase);
              } else if (ase.colorDepth === 16) {
                // 16-bit - convert to RGBA
                renderRGB16(data, cel, ase);
              } else if (ase.colorDepth === 8 && ase.palette) {
                // 8-bit indexed - use palette
                renderIndexed(data, cel, ase);
              } else {
                // Fallback: treat as RGBA
                renderRGBA(data, cel, ase);
              }
            }
          }

          ctx.putImageData(imageData, 0, 0);
          showStatus(`✓ Loaded: ${filename}`, "success");

          showMeta({
            filename,
            width: ase.width,
            height: ase.height,
            frameCount: ase.frames.length,
            colorDepth: ase.colorDepth,
          });
        } catch (error) {
          showStatus(`✗ Error: ${error.message}`, "error");
          console.error(error);
        }
      }

      async function loadFromUrl(url) {
        try {
          showStatus("Fetching file...", "loading");
          const response = await fetch(url);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const buffer = await response.arrayBuffer();
          const filename = url.split("/").pop() || "unknown.ase";
          renderAseprite(buffer, filename);
        } catch (error) {
          showStatus(`✗ Failed: ${error.message}`, "error");
        }
      }

      async function loadFromFile(file) {
        try {
          showStatus("Reading file...", "loading");
          const buffer = await file.arrayBuffer();
          renderAseprite(buffer, file.name);
        } catch (error) {
          showStatus(`✗ Error: ${error.message}`, "error");
        }
      }

      window.loadFromPath = function () {
        const path = filePathInput.value.trim();
        if (!path) {
          showStatus("Enter a file path", "error");
          return;
        }
        loadFromUrl(path);
      };

      window.addEventListener("load", () => {
        const params = new URLSearchParams(window.location.search);
        const filePath = params.get("file");
        if (filePath) {
          filePathInput.value = filePath;
          loadFromUrl(filePath);
        }
      });

      previewArea.addEventListener("dragover", (e) => {
        e.preventDefault();
        previewArea.classList.add("drag-over");
      });

      previewArea.addEventListener("dragleave", () => {
        previewArea.classList.remove("drag-over");
      });

      previewArea.addEventListener("drop", (e) => {
        e.preventDefault();
        previewArea.classList.remove("drag-over");
        if (e.dataTransfer.files[0]) loadFromFile(e.dataTransfer.files[0]);
      });

      previewArea.addEventListener("click", () => fileInput.click());
      fileInput.addEventListener("change", (e) => {
        if (e.target.files[0]) loadFromFile(e.target.files[0]);
      });
    </script>
  </body>
</html>
