<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASE Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
            background: #1a1a1a;
            color: #e0e0e0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: #2d2d2d;
            border: 1px solid #404040;
            border-radius: 8px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 24px;
        }

        .info-text {
            font-size: 12px;
            color: #888;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
            background: #353535;
            border: 1px solid #505050;
            border-radius: 4px;
            color: #e0e0e0;
            font-family: monospace;
            font-size: 12px;
        }

        button {
            background: #505050;
            border: 1px solid #606060;
            color: #e0e0e0;
            padding: 10px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }

        button:hover {
            background: #606060;
        }

        .preview-area {
            background: #1a1a1a;
            border: 2px dashed #404040;
            border-radius: 6px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 300px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .preview-area:hover {
            border-color: #505050;
            background: #252525;
        }

        .preview-area.drag-over {
            border-color: #99ccff;
            background: #2d3a4a;
        }

        #canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            max-width: 100%;
            max-height: 400px;
            border: 1px solid #404040;
            border-radius: 4px;
        }

        .status {
            padding: 12px;
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.loading {
            background: #2d4a2d;
            color: #7fc97f;
            border: 1px solid #4a7a4a;
        }

        .status.error {
            background: #4a2d2d;
            color: #ff9999;
            border: 1px solid #7a4a4a;
        }

        .status.success {
            background: #2d3a4a;
            color: #99ccff;
            border: 1px solid #4a6a7a;
        }

        .meta {
            background: #353535;
            border-left: 3px solid #505050;
            padding: 12px 16px;
            border-radius: 4px;
            font-size: 12px;
            line-height: 1.6;
            display: none;
        }

        .meta.show {
            display: block;
        }

        .meta strong {
            color: #99ccff;
        }

        .url-display {
            background: #1a1a1a;
            border: 1px solid #404040;
            padding: 10px;
            border-radius: 4px;
            font-size: 11px;
            margin-top: 16px;
            word-break: break-all;
            color: #888;
            font-family: monospace;
        }

        input[type="file"] {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 ASE Preview</h1>
        <div class="info-text">Load an ASE file to preview the first frame</div>

        <div class="controls">
            <input type="text" id="filePath" placeholder="e.g., ./sprites/character.ase or https://example.com/file.ase">
            <button onclick="loadFromPath()">Load</button>
        </div>

        <div id="status" class="status"></div>

        <div class="preview-area" id="previewArea">
            <canvas id="canvas"></canvas>
        </div>

        <div id="metaInfo" class="meta"></div>

        <div class="url-display">
            <strong>Tip:</strong> Use URL parameter to auto-load: <code>?file=path/to/file.ase</code><br>
            Example: <code>?file=./sprites/player.ase</code>
        </div>
    </div>

    <input type="file" id="fileInput" accept=".ase,.aseprite">

    <script type="module">
        import parseAse from 'https://esm.sh/ase-parser@0.0.18';
        window.parseAse = parseAse;
        
        const canvas = document.getElementById('canvas');
        const statusDiv = document.getElementById('status');
        const metaInfo = document.getElementById('metaInfo');
        const filePathInput = document.getElementById('filePath');
        const previewArea = document.getElementById('previewArea');
        const fileInput = document.getElementById('fileInput');

        function showStatus(message, type = 'info') {
            statusDiv.className = `status show ${type}`;
            statusDiv.textContent = message;
        }

        function showMeta(data) {
            metaInfo.className = 'meta show';
            metaInfo.innerHTML = `
                <strong>File:</strong> ${data.filename}<br>
                <strong>Dimensions:</strong> ${data.width}×${data.height}px<br>
                <strong>Frames:</strong> ${data.frameCount}<br>
                <strong>Color Depth:</strong> ${data.colorDepth}-bit<br>
                <strong>First Frame Duration:</strong> ${data.duration}ms
            `;
        }

        window.renderAseprite = async function(buffer, filename) {
            try {
                showStatus('Parsing ASE file...', 'loading');

                const ase = window.parseAse(buffer);

                if (!ase || !ase.frames || ase.frames.length === 0) {
                    throw new Error('No frames found in file');
                }

                canvas.width = ase.width;
                canvas.height = ase.height;

                const ctx = canvas.getContext('2d');
                const imageData = ctx.createImageData(ase.width, ase.height);

                const firstFrame = ase.frames[0];
                if (firstFrame.pixels) {
                    imageData.data.set(firstFrame.pixels);
                } else {
                    throw new Error('Frame has no pixel data');
                }

                ctx.putImageData(imageData, 0, 0);

                showStatus(`✓ Loaded: ${filename}`, 'success');

                showMeta({
                    filename: filename,
                    width: ase.width,
                    height: ase.height,
                    frameCount: ase.frames.length,
                    colorDepth: ase.colorDepth || '?',
                    duration: firstFrame.duration || 0
                });

            } catch (error) {
                showStatus(`✗ Error: ${error.message}`, 'error');
                console.error(error);
            }
        };

        window.loadFromUrl = async function(url) {
            try {
                showStatus('Fetching file...', 'loading');

                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const buffer = await response.arrayBuffer();
                const filename = url.split('/').pop() || 'unknown.ase';
                await window.renderAseprite(buffer, filename);

            } catch (error) {
                showStatus(`✗ Failed to load: ${error.message}`, 'error');
                console.error(error);
            }
        };

        window.loadFromFile = async function(file) {
            try {
                showStatus('Reading file...', 'loading');
                const buffer = await file.arrayBuffer();
                await window.renderAseprite(buffer, file.name);
            } catch (error) {
                showStatus(`✗ Error: ${error.message}`, 'error');
            }
        };

        window.loadFromPath = function() {
            const path = filePathInput.value.trim();
            if (!path) {
                showStatus('Please enter a file path', 'error');
                return;
            }
            window.loadFromUrl(path);
        };

        // Check for URL parameter on page load
        window.addEventListener('load', () => {
            const params = new URLSearchParams(window.location.search);
            const filePath = params.get('file');

            if (filePath) {
                filePathInput.value = filePath;
                window.loadFromUrl(filePath);
            }
        });

        // Drag and drop
        previewArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            previewArea.classList.add('drag-over');
        });

        previewArea.addEventListener('dragleave', () => {
            previewArea.classList.remove('drag-over');
        });

        previewArea.addEventListener('drop', (e) => {
            e.preventDefault();
            previewArea.classList.remove('drag-over');
            if (e.dataTransfer.files[0]) {
                window.loadFromFile(e.dataTransfer.files[0]);
            }
        });

        // Click to browse
        previewArea.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                window.loadFromFile(e.target.files[0]);
            }
        });
    </script>
</body>
</html>
