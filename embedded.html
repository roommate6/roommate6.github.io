<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded | Roommate's Portfolio</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="embedded.html" class="active">Embedded</a>
    </nav>

    <main class="container">

        <h1>Embedded Projects</h1>

        <p>
            This page showcases my embedded systems projects, firmware,
            electronics, PCB designs, robotics, and other hardware-related work.
        </p>

        <!-- Search & Sort -->
        <div class="toolbar">

            <input
                type="text"
                id="searchBox"
                placeholder="Search projects..."
            >

            <select id="sortSelect">
                <option value="newest">Newest First</option>
                <option value="oldest">Oldest First</option>
            </select>

        </div>

        <!-- Projects will be inserted here by JavaScript -->
        <div id="projectsContainer">

            <div class="card">
                <h2>Coming Soon</h2>

                <p>
                    Projects will automatically appear here once they are added
                    to <code>js/embedded-data.js</code>.
                </p>
            </div>

        </div>

    </main>

    <footer>
        © 2026 Roommate
    </footer>

    <!-- Data -->
    <script src="js/embedded-data.js"></script>

    <!-- Page Logic -->
    <script src="js/embedded-page.js"></script>

</body>
</html>
